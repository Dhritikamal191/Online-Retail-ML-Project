name: Online Retail CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show Project Structure
        run: ls -R

      - name: Check Python Files
        run: |
          python -m py_compile api.py
          python -m py_compile predict.py
          python -m py_compile preprocessing.py
          python -m py_compile feature_engineering.py
          python -m py_compile data_ingestion.py
          python -m py_compile data_validation.py
          python -m py_compile train.py
          python -m py_compile retrain.py
          python -m py_compile monitor.py
          python -m py_compile drift_detection.py

      - name: Check Imports
        run: |
          python -c "import api"
          python -c "import predict"
          python -c "import preprocessing"
          python -c "import feature_engineering"
          python -c "import data_ingestion"
          python -c "import data_validation"
          python -c "import train"
          python -c "import retrain"
          python -c "import monitor"
          python -c "import drift_detection"

      - name: CI Passed
        run: echo "✅ CI completed successfully!"
